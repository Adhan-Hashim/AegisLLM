[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aegisllm-risk-engine"
version = "0.1.0"
description = "Core Risk Engine for AegisLLM"
authors = [
    { name = "AegisLLM Team", email = "team@aegisllm.io" }
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0"
]
requires-python = ">=3.9"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "pytest-asyncio",
    "hypothesis",
    "ruff",
    "mypy"
]
