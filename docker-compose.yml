version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegisllm_postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aegisllm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aegisllm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
